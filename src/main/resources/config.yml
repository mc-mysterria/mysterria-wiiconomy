# "name"   вАФ displayed on the physical item and in GUI previews (non-italic, no translatable)
# "format" вАФ used in balance / price strings, e.g. "<yellow>3 бі†біЗ А Я біЕбіП Аs"
coins:
  verldor:
    name:   "<yellow>бі†біЗ А Я біЕбіП А"
    format: "<yellow>%value% бі†біЗ А Я біЕбіП Аs"
  lick:
    name:   "<gray> Я…™біДбіЛ"
    format: "<gray>%value%  Я…™біДбіЛs"
