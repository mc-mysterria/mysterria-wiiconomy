      lore:
        - ""
        - "<gray>біД Я…™біДбіЛ біЫбіП …ҐбіП  ЩбіАбіДбіЛ"
        - ""

# Selling GUI вАФ sell confirmation
# confirm-available:   shown when the daily limit allows the sale; supports %price%
# confirm-unavailable: shown when the item cannot be sold (bad type or daily limit hit)
selling-gui:
  title: ""
  background: GRAY_STAINED_GLASS_PANE
  preview-slot: [4, 1]
  items:
    confirm-available:
      slot: [2, 1]
      material: LIME_WOOL
      name: "<green>sбіЗ Я Я"
      lore:
        - ""
        - "<gray>біШ А…™біДбіЗ: <#FFD700>%price%"
        - "<gray>біД Я…™біДбіЛ біЫбіП біДбіП…ікЬ∞…™ АбіН"
        - ""
    confirm-unavailable:
      slot: [2, 1]
      material: BARRIER
      name: "<red>біДбіА…і…ібіПбіЫ sбіЗ Я Я"
      lore:
        - ""
        - "<gray>…™біЫбіЗбіН …ібіПбіЫ sбіЗ Я ЯбіА Щ ЯбіЗ біП А"
        - "<gray>біЕбіА…™ Я П  Я…™біН…™біЫ  АбіЗбіАбіД ЬбіЗбіЕ"
        - ""
    cancel:
      slot: [6, 1]
      material: RED_WOOL
      name: "<red>біДбіА…ібіДбіЗ Я"
      lore:
        - ""
        - "<gray>біД Я…™біДбіЛ біЫбіП …ҐбіП  ЩбіАбіДбіЛ"
        - ""
  # Dynamic lore appended to the item preview вАФ supports MiniMessage formatting
  lore:
    separator-available: "<dark_green>вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА"
    separator-unavailable: "<dark_red>вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА"
    not-sellable: "<red>…ібіПбіЫ sбіЗ Я ЯбіА Щ ЯбіЗ"
    daily-limit: "<gold>біЕбіА…™ Я П  Я…™біН…™біЫ  АбіЗбіАбіД ЬбіЗбіЕ"

# Settings GUI вАФ theme picker shown when a player clicks the settings item in WalletGUI
# Each entry under "themes" is a standard item config section plus a "wallet-title" key.
# "wallet-title" is the MiniMessage string (typically a texture-glyph char) used as the
# WalletGUI window title when the player has this theme selected.
# Use %selected% in name/lore to show "вЬФ " prefix for the currently active theme.
settings-gui:
  title: ""
  background: GRAY_STAINED_GLASS_PANE
  themes:
    theme-1:
      slot: [3, 1]
      material: BROWN_DYE
      name: "%selected%<white>біЫ ЬбіЗбіНбіЗ 1"
      lore:
        - "<gray>біД Я…™біДбіЛ біЫбіП sбіЗ ЯбіЗбіДбіЫ"
      wallet-title: "<shift:-48><glyph:bronze_wallet>"
      vault-title: "<shift:-48><glyph:bronze_vault>"
      background: AIR
    theme-2:
      slot: [4, 1]
      material: BLACK_DYE
      name: "%selected%<aqua>біЫ ЬбіЗбіНбіЗ 2"
      lore:
        - "<gray>біД Я…™біДбіЛ біЫбіП sбіЗ ЯбіЗбіДбіЫ"
      wallet-title: "<shift:-48><glyph:black_wallet>"
      vault-title: "<shift:-48><glyph:black_vault>"
      background: AIR
    theme-3:
      slot: [5, 1]
      material: ORANGE_DYE
      name: "%selected%<light_purple>біЫ ЬбіЗбіНбіЗ 3"
      lore:
        - "<gray>біД Я…™біДбіЛ біЫбіП sбіЗ ЯбіЗбіДбіЫ"
      wallet-title: "<shift:-48><glyph:golden_wallet>"
      vault-title: "<shift:-48><glyph:golden_vault>"
      background: AIR
  items:
    back:
      slot: [8, 2]
      material: RED_WOOL
      name: "<red> ЩбіАбіДбіЛ"
      lore:
        - ""
        - "<gray> АбіЗбіЫбіЬ А…і біЫбіП бі°біА Я ЯбіЗбіЫ"
        - ""

