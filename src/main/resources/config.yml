# Vault GUI вАФ balance overview and coin/item interactions
# Slots use [col, row] notation (0-based). The GUI is 3 rows √Ч 9 cols.
#   wallet-coins-start:    start slot for wallet coins (VerlDor вЖТ Lick вЖТ Coppet), fills right
#   inventory-items-start: start slot for actionable player inventory items, fills right
vault-gui:
  title: ""
  background: NONE
  wallet-coins-start: [2, 0]
  inventory-items-start: [1, 1]
  items:
    balance:
      slot: [1, 0]
      material: GOLD_INGOT
      name: "<#FFD700> ЩбіА ЯбіА…ібіДбіЗ"
      lore:
        - "<gray>sбіЫбіП АбіЗбіЕ: <#FFD700>%balance%"
        - ""
        - "<dark_gray>біД Я…™біДбіЛ біА біДбіП…™…і біЫбіП бі°…™біЫ ЬбіЕ АбіАбі°"
        - "<dark_gray>біД Я…™біДбіЛ біА  ЩбіА…Ґ …™біЫбіЗбіН біЫбіП sбіЗ Я Я"
      item-model: "wallet:balance"

# Action GUI вАФ deposit / withdrawal confirmation
# preview-slot: [col, row] for the coin preview item
action-gui:
  title: ""
  background: GRAY_STAINED_GLASS_PANE
  preview-slot: [4, 1]
  items:
    confirm:
      slot: [2, 1]
      material: LIME_WOOL
      name: "<green>біДбіП…ікЬ∞…™ АбіН"
      lore:
        - ""
        - "<gray>біД Я…™біДбіЛ біЫбіП біДбіП…ікЬ∞…™ АбіН біЫ Ь…™s біАбіДбіЫ…™біП…і"
